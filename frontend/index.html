<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>阿福</title>
<meta name="theme-color" content="#090909">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/alfred/manifest.json">
<link rel="apple-touch-icon" href="/alfred/icon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#090909;--card-bg:#13110e;--gold:#c9a84c;--gold-dim:rgba(201,168,76,0.3);
  --text:#e8d5b7;--text-dim:rgba(232,213,183,0.4);--surface:#1a1712;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,'PingFang TC','Hiragino Sans GB',sans-serif;}

/* ── MAIN SCREEN ── */
#screen{
  height:100dvh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;position:relative;
  cursor:pointer;
}

/* Alfred presence */
#afu-wrap{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center;}
.ring{
  position:absolute;border-radius:50%;
  border:1px solid var(--gold-dim);
  animation:breathe 3.5s ease-in-out infinite;
}
.ring:nth-child(1){width:100%;height:100%;}
.ring:nth-child(2){width:135%;height:135%;animation-delay:.6s;opacity:.5;}
.ring:nth-child(3){width:170%;height:170%;animation-delay:1.2s;opacity:.2;}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.5;}50%{transform:scale(1.04);opacity:1;}}

#afu-avatar{
  width:110px;height:110px;border-radius:50%;
  background:radial-gradient(circle at 38% 38%,#2a2218,#0d0a07);
  border:1.5px solid var(--gold-dim);
  display:flex;align-items:center;justify-content:center;
  font-size:52px;position:relative;z-index:1;
  box-shadow:0 0 40px rgba(201,168,76,0.08);
  transition:box-shadow .3s,border-color .3s;
}
body.listening #afu-avatar{border-color:rgba(255,255,255,0.5);box-shadow:0 0 60px rgba(255,255,255,0.06);}
body.thinking #afu-avatar{border-color:var(--gold);box-shadow:0 0 60px rgba(201,168,76,0.2);}
body.listening .ring{animation:pulse-ring .7s ease-in-out infinite;border-color:rgba(255,255,255,0.2);}
@keyframes pulse-ring{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}

#afu-name{
  margin-top:28px;font-size:13px;letter-spacing:4px;
  color:var(--text-dim);text-transform:uppercase;
}

/* Waveform */
#waveform{
  position:absolute;bottom:100px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:5px;
  opacity:0;transition:opacity .3s;
}
body.listening #waveform{opacity:1;}
.wbar{
  width:4px;border-radius:3px;background:var(--gold);
  animation:wv .7s ease-in-out infinite;
}
.wbar:nth-child(1){height:10px;animation-delay:0s;}
.wbar:nth-child(2){height:22px;animation-delay:.1s;}
.wbar:nth-child(3){height:34px;animation-delay:.2s;}
.wbar:nth-child(4){height:22px;animation-delay:.3s;}
.wbar:nth-child(5){height:10px;animation-delay:.4s;}
@keyframes wv{0%,100%{transform:scaleY(.5);}50%{transform:scaleY(1.4);}}

/* Response area */
#resp-area{
  position:absolute;bottom:150px;left:0;right:0;
  padding:0 28px;text-align:center;pointer-events:none;
}
#user-said{font-size:12px;color:var(--text-dim);margin-bottom:14px;font-style:italic;min-height:16px;}
#afu-reply{font-size:17px;line-height:1.75;color:var(--text);min-height:24px;max-height:180px;overflow:hidden;}

/* Tap hint */
#hint{
  position:absolute;bottom:32px;width:100%;text-align:center;
  font-size:11px;color:var(--text-dim);letter-spacing:1.5px;
}

/* ── CARD ── */
#card-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.75);
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#card-overlay.open{opacity:1;pointer-events:all;}
#card{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--surface);
  border-top:1px solid var(--gold-dim);
  border-radius:22px 22px 0 0;
  max-height:82dvh;
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .45s cubic-bezier(.34,1.56,.64,1);
}
#card-overlay.open #card{transform:translateY(0);}
#card-bar{width:38px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:12px auto 0;}
#card-header{
  padding:16px 22px 14px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(201,168,76,0.1);
}
#card-ttl{font-size:16px;color:var(--gold);font-weight:600;}
#card-acts{display:flex;gap:10px;}
.cbtn{
  background:none;border:1px solid var(--gold-dim);color:var(--gold);
  padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;
  font-family:inherit;
}
.cbtn:active{background:var(--gold-dim);}
#card-body{
  padding:20px 22px 32px;overflow-y:auto;flex:1;
  font-size:15px;line-height:1.85;color:var(--text);
  -webkit-overflow-scrolling:touch;
}
#card-body h1,#card-body h2,#card-body h3{color:var(--gold);margin:18px 0 8px;}
#card-body h1{font-size:18px;}#card-body h2{font-size:16px;}#card-body h3{font-size:14px;}
#card-body ul,#card-body ol{padding-left:20px;margin:8px 0;}
#card-body li{margin:6px 0;}
#card-body strong{color:#f0dca0;}
#card-body p{margin:8px 0;}
#card-body hr{border:none;border-top:1px solid var(--gold-dim);margin:16px 0;}
#card-body table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px;}
#card-body th,#card-body td{padding:8px 10px;border:1px solid rgba(201,168,76,0.2);text-align:left;}
#card-body th{color:var(--gold);background:rgba(201,168,76,0.06);}

/* ── BOTTOM NAV ── */
#nav{
  position:fixed;bottom:0;left:0;right:0;
  padding:16px 0 8px;display:flex;justify-content:center;gap:48px;
  pointer-events:none;opacity:0;transition:opacity .4s;
}
#nav:hover,#nav.visible{opacity:1;}
.nav-btn{
  background:none;border:none;color:rgba(232,213,183,0.2);
  font-size:10px;letter-spacing:1px;cursor:pointer;
  font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;
  pointer-events:all;transition:color .2s;
}
.nav-btn:active{color:var(--gold);}
.nav-icon{font-size:16px;}

/* Thinking dot animation */
@keyframes dotpulse{0%,80%,100%{opacity:.3;}40%{opacity:1;}}
.dot{display:inline-block;animation:dotpulse 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

/* ── CAMERA BUTTON ── */
#cam-btn{
  position:fixed;bottom:22px;left:18px;
  background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);
  border-radius:50%;width:38px;height:38px;
  color:rgba(201,168,76,0.45);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:150;transition:color .2s,background .2s;
}
#cam-btn:active{color:#c9a84c;background:rgba(201,168,76,0.18);}
#file-btn{
  position:fixed;bottom:22px;left:64px;
  background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);
  border-radius:50%;width:38px;height:38px;
  color:rgba(201,168,76,0.45);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:150;transition:color .2s,background .2s;
}
#file-btn:active{color:#c9a84c;background:rgba(201,168,76,0.18);}
#cam-input{display:none;}

/* ── TEXT INPUT MODE ── */
#kbd-toggle{
  position:fixed;bottom:22px;right:18px;
  background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);
  border-radius:50%;width:38px;height:38px;
  color:rgba(201,168,76,0.45);font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:150;transition:color .2s,background .2s;
}
#kbd-toggle.active{color:#c9a84c;background:rgba(201,168,76,0.18);}
#txt-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(12,9,5,0.97);
  border-top:1px solid rgba(201,168,76,0.25);
  padding:12px 14px;
  padding-bottom:max(12px,env(safe-area-inset-bottom));
  display:flex;gap:10px;align-items:center;
  transform:translateY(100%);transition:transform .3s ease;
  z-index:140;
}
#txt-bar.open{transform:translateY(0);}
#txt-close{background:none;border:none;color:rgba(232,213,183,0.3);font-size:20px;cursor:pointer;padding:4px;flex-shrink:0;line-height:1;}
#txt-input{
  flex:1;background:rgba(201,168,76,0.07);
  border:1px solid rgba(201,168,76,0.22);border-radius:20px;
  color:#e8d5b7;font-size:16px;font-family:inherit;
  padding:10px 16px;outline:none;
}
#txt-input::placeholder{color:rgba(232,213,183,0.3);}
#txt-mute{
  background:none;border:1px solid rgba(201,168,76,0.25);border-radius:50%;
  width:38px;height:38px;color:rgba(201,168,76,0.5);font-size:16px;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
}
#txt-send{
  background:rgba(201,168,76,0.14);border:1px solid rgba(201,168,76,0.38);
  border-radius:50%;width:42px;height:42px;color:#c9a84c;font-size:20px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* ── Ambient listening bar ── */
#ambient-bar{
  position:fixed;top:0;left:0;right:0;z-index:300;
  background:rgba(12,8,3,0.97);border-bottom:1px solid rgba(201,168,76,0.4);
  padding:10px 16px;display:none;align-items:center;gap:10px;
}
#ambient-bar.active{display:flex;}
#ambient-dot{width:10px;height:10px;border-radius:50%;background:#c9a84c;flex-shrink:0;animation:ambpulse 1.4s ease-in-out infinite;}
@keyframes ambpulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
#ambient-label{flex:1;font-size:13px;color:#e8d5b7;}
#ambient-counter{font-size:11px;color:rgba(201,168,76,0.7);min-width:40px;text-align:right;}
#ambient-stop{padding:6px 14px;border-radius:20px;border:1px solid rgba(201,168,76,0.5);background:rgba(201,168,76,0.08);color:#c9a84c;font-size:12px;cursor:pointer;flex-shrink:0;}

/* Audio player */
#media-player{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  width:calc(100% - 32px);max-width:420px;
  background:rgba(18,14,8,0.97);border:1px solid rgba(201,168,76,0.4);
  border-radius:16px;padding:16px 18px;z-index:200;
  display:none;flex-direction:column;gap:10px;
  box-shadow:0 8px 32px rgba(0,0,0,0.7);
}
#media-player.visible{display:flex;}
#mp-title{font-size:13px;color:#e8d5b7;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
#mp-show{font-size:11px;color:rgba(201,168,76,0.7);}
#mp-audio{width:100%;height:32px;accent-color:#c9a84c;}
#mp-close{position:absolute;top:10px;right:14px;color:rgba(232,213,183,0.5);font-size:18px;cursor:pointer;background:none;border:none;}

/* Toast */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:rgba(18,14,8,0.97);border:1px solid rgba(201,168,76,0.4);
  border-radius:12px;padding:12px 20px;color:#e8d5b7;font-size:13px;
  z-index:300;text-align:center;pointer-events:none;
  animation:toast-in .25s ease;
}
@keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
</style>
</head>
<body>

<div id="screen" onclick="toggleListen()">
  <div id="afu-wrap">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div id="afu-avatar">🎩</div>
  </div>
  <div id="afu-name">A L F R E D</div>

  <div id="waveform">
    <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
    <div class="wbar"></div><div class="wbar"></div>
  </div>

  <div id="resp-area">
    <div id="user-said"></div>
    <div id="afu-reply"></div>
  </div>

  <div id="hint">輕觸說話</div>
</div>

<!-- Camera button -->
<button id="cam-btn" onclick="document.getElementById('cam-input').click()" title="拍照辨識">📷</button>
<input id="cam-input" type="file" accept="image/*" capture="environment" onchange="analyzePhoto(this)">

<!-- File upload button -->
<button id="file-btn" onclick="document.getElementById('file-input').click()" title="傳文件給阿福">📎</button>
<input id="file-input" type="file" accept=".pdf,.docx,.doc,.txt,.md,.xlsx,.xls,.pptx,.csv" style="display:none" onchange="uploadDocument(this)">

<!-- Keyboard toggle -->
<button id="kbd-toggle" onclick="toggleTextInput()" title="打字模式">⌨</button>

<!-- Text input bar -->
<div id="txt-bar">
  <button id="txt-close" onclick="toggleTextInput()">✕</button>
  <input id="txt-input" type="text" placeholder="輸入訊息給阿福…"
    onkeydown="if(event.key==='Enter'&&!event.isComposing)sendTyped()"
    autocomplete="off" autocorrect="off" autocapitalize="none">
  <button id="txt-mute" onclick="toggleMute()" title="靜音">🔇</button>
  <button id="txt-send" onclick="sendTyped()">↑</button>
</div>

<!-- Ambient bar -->
<div id="ambient-bar">
  <div id="ambient-dot"></div>
  <div id="ambient-label">阿福聆聽中</div>
  <div id="ambient-counter">0 段</div>
  <button id="ambient-stop" onclick="stopAmbient()">停止 · 出報告</button>
</div>

<!-- Media player -->
<div id="media-player">
  <button id="mp-close" onclick="closeMediaPlayer()">✕</button>
  <div id="mp-show"></div>
  <div id="mp-title"></div>
  <audio id="mp-audio" controls preload="none"></audio>
</div>

<!-- Nav (long-press ghost) -->
<div id="nav">
  <button class="nav-btn" onclick="event.stopPropagation();toggleTextInput()" style="width:100%;justify-content:center;">
    <span class="nav-icon">✏️</span>打字
  </button>
</div>

<!-- Card -->
<div id="card-overlay">
  <div id="card">
    <div id="card-bar"></div>
    <div id="card-header">
      <div id="card-ttl"></div>
      <div id="card-acts">
        <button class="cbtn" onclick="readCard()">🔊 朗讀</button>
        <button class="cbtn" onclick="closeCard()">關閉</button>
      </div>
    </div>
    <div id="card-body"></div>
  </div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const API = '/alfred/api';
const HIST_KEY = 'alfred_history_v2';
const DEV_KEY  = 'alfred_device_id';
const TOK_KEY  = 'alfred_token';

// ── State ─────────────────────────────────────────────────────────────────────
let listening = false, recog = null;
let history = [];
let _token = null;
let _muted = false;
let cardText = '';

// ── Device auth ───────────────────────────────────────────────────────────────
function getOrCreateDeviceId() {
  let id = localStorage.getItem(DEV_KEY);
  if (!id) {
    id = 'web-' + crypto.randomUUID();
    localStorage.setItem(DEV_KEY, id);
  }
  return id;
}

async function ensureAuth() {
  _token = localStorage.getItem(TOK_KEY);
  if (_token) return;
  try {
    const r = await fetch(API + '/auth/device', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({device_id: getOrCreateDeviceId()})
    });
    const d = await r.json();
    if (d.ok && d.token) {
      _token = d.token;
      localStorage.setItem(TOK_KEY, _token);
    }
  } catch(e) {
    console.warn('[Alfred] auth failed:', e);
  }
}

function authHeaders() {
  const h = {'Content-Type':'application/json'};
  if (_token) h['Authorization'] = 'Bearer ' + _token;
  return h;
}

function apiFetch(path, opts = {}) {
  const headers = {...(opts.headers || {}), ...(opts.noContentType ? {} : {'Content-Type':'application/json'})};
  if (_token) headers['Authorization'] = 'Bearer ' + _token;
  return fetch(API + path, {...opts, headers});
}

// ── History persistence ───────────────────────────────────────────────────────
function loadHistory() {
  try { history = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e) { history = []; }
}
function saveHistory() {
  if (history.length > 30) history = history.slice(-30);
  try { localStorage.setItem(HIST_KEY, JSON.stringify(history)); } catch(e) {}
}

// ── UI State ─────────────────────────────────────────────────────────────────
function setState(s) {
  document.body.className = s;
  const status = {listening:'正在聆聽…', thinking:'', '':'輕觸說話'};
  if (s === 'thinking') {
    document.getElementById('hint').innerHTML = '<span class="dot">·</span><span class="dot">·</span><span class="dot">·</span>';
  } else {
    document.getElementById('hint').textContent = status[s] ?? '輕觸說話';
  }
}

function showToast(msg, ms = 3000) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), ms);
}

// ── Voice ─────────────────────────────────────────────────────────────────────
function toggleListen() {
  unlockAudio();
  const greet = document.getElementById('afu-reply')._greet;
  if (greet) {
    delete document.getElementById('afu-reply')._greet;
    speak(greet);
    document.getElementById('hint').textContent = '輕觸說話';
    return;
  }
  if (listening) { stopListen(); } else { startListen(); }
}

function startListen() {
  stopSpeaking();
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('請使用 Safari 以啟用語音'); return; }
  recog = new SR();
  recog.lang = 'zh-TW'; recog.interimResults = false; recog.maxAlternatives = 1;
  recog.onstart  = () => { listening = true; setState('listening'); document.getElementById('user-said').textContent = ''; document.getElementById('afu-reply').textContent = ''; };
  recog.onresult = (e) => { const t = e.results[0][0].transcript; document.getElementById('user-said').textContent = '「' + t + '」'; sendMsg(t); };
  recog.onerror  = () => { setState(''); listening = false; };
  recog.onend    = () => { listening = false; if (document.body.className === 'listening') setState('thinking'); };
  recog.start();
}

function stopListen() { if (recog) recog.stop(); listening = false; setState(''); }

// ── Send message (SSE streaming) ──────────────────────────────────────────────
async function sendMsg(msg) {
  setState('thinking');
  history.push({role:'user', content: msg});
  saveHistory();

  const replyEl = document.getElementById('afu-reply');
  cancelTypeWrite();
  replyEl.textContent = '';

  try {
    const r = await fetch(API + '/chat/stream', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({message: msg, history: history.slice(-10,-1)})
    });

    if (!r.ok || !r.body) throw new Error('stream failed ' + r.status);

    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let fullText = '';
    let finalCard = null, finalAction = null;

    while (true) {
      const {value, done} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        let payload;
        try { payload = JSON.parse(line.slice(5).trim()); } catch(e) { continue; }

        if (payload.done) {
          fullText = payload.text || fullText;
          finalCard = payload.card;
          finalAction = payload.action;
          replyEl.textContent = fullText;
        } else if (payload.delta) {
          fullText += payload.delta;
          replyEl.textContent = fullText;
        } else if (payload.thinking) {
          // keep thinking state, maybe show subtle indicator
        }
      }
    }

    setState('');
    history.push({role:'assistant', content: fullText});
    saveHistory();

    if (fullText) speak(fullText);
    if (finalCard) setTimeout(() => showCard(finalCard), 400);
    if (finalAction) handleAction(finalAction);

    if (document.getElementById('txt-bar')?.classList.contains('open')) {
      setTimeout(() => document.getElementById('txt-input')?.focus(), 300);
    }

  } catch(e) {
    console.error('[Alfred] stream error:', e);
    // Fallback to batch
    try {
      const r2 = await fetch(API + '/chat', {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({message: msg, history: history.slice(-10,-1)})
      });
      const d2 = await r2.json();
      setState('');
      const txt = d2.text || '';
      typeWrite(txt); speak(txt);
      history.push({role:'assistant', content: txt});
      saveHistory();
      if (d2.card) setTimeout(() => showCard(d2.card), 400);
      if (d2.action) handleAction(d2.action);
    } catch(e2) {
      setState('');
      replyEl.textContent = '阿福暫時連不上，請再試一次。';
    }
  }
}

// ── Action handler ────────────────────────────────────────────────────────────
function handleAction(action) {
  if (!action?.type) return;
  switch (action.type) {
    case 'sub_app':
      handleSubApp(action);
      break;
    case 'call':

    case 'ai_call':
      showCallOverlay(action.call_id, action.name);

      break;
    case 'open_url':
      setTimeout(() => {

    case 'start_ambient':

// ── Audio ─────────────────────────────────────────────────────────────────────
const AC = window.AudioContext || window.webkitAudioContext;
let actx = null, currentSource = null;

function unlockAudio() {
  if (actx) return;
  actx = new AC();
  const buf = actx.createBuffer(1,1,22050);
  const src = actx.createBufferSource();
  src.buffer = buf; src.connect(actx.destination); src.start(0);
}

async function speak(text) {
  if (_muted) return;
  stopSpeaking();
  if (!actx) { speakFallback(text); return; }
  if (actx.state === 'suspended') await actx.resume();
  try {
    const resp = await fetch(API + '/tts', {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({text})
    });
    const arrayBuf = await resp.arrayBuffer();
    const audioBuf = await actx.decodeAudioData(arrayBuf);
    currentSource = actx.createBufferSource();
    currentSource.buffer = audioBuf;
    currentSource.playbackRate.value = 0.92;
    currentSource.connect(actx.destination);
    currentSource.start(0);
  } catch(e) {
    speakFallback(text);
  }
}

function speakFallback(text) {
  window.speechSynthesis.cancel();
  window.speechSynthesis.resume();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-TW'; u.rate = 0.78; u.pitch = 0.52; u.volume = 1;
  const voices = window.speechSynthesis.getVoices();
  const pick = voices.find(v => /zh/.test(v.lang) && /male|man/i.test(v.name))
              || voices.find(v => /zh-TW/.test(v.lang))
              || voices.find(v => /zh/.test(v.lang));
  if (pick) u.voice = pick;
  window.speechSynthesis.speak(u);
}

function stopSpeaking() {
  window.speechSynthesis.cancel();
  if (currentSource) { try { currentSource.stop(); } catch(e) {} currentSource = null; }
}

function md(t) {
  return t
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^- (.+?) \[\[done:(\d+)\]\]$/gm, (_,title,id) =>
      `<li style="display:flex;align-items:center;gap:10px;">${title}<button onclick="completeTodo(${id},this)" style="background:none;border:1px solid var(--gold-dim);color:var(--gold);border-radius:12px;padding:2px 10px;font-size:11px;cursor:pointer;">完成</button></li>`)
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.+<\/li>\n?)+/g, '<ul>$&</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

// ── Ambient mode ──────────────────────────────────────────────────────────────
let _ambSessionId = null, _ambMediaRecorder = null, _ambStream = null;
let _ambChunkCount = 0, _ambInterval = null;
const AMB_INTERVAL_MS = 45000;

async function startAmbient(label) {
  if (_ambSessionId) { showToast('已經在聆聽中'); return; }
  try {
    _ambStream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
  } catch(e) { showToast('麥克風授權失敗：' + e.message); return; }

  const r = await apiFetch('/ambient/start', {method:'POST', body:JSON.stringify({label: label || `辦公記錄 ${new Date().toLocaleDateString('zh-TW')}`})});
  const d = await r.json();
  _ambSessionId = d.session_id; _ambChunkCount = 0;

  document.getElementById('ambient-label').textContent = d.label;
  document.getElementById('ambient-counter').textContent = '0 段';
  document.getElementById('ambient-bar').classList.add('active');

  _startAmbChunk();
  _ambInterval = setInterval(_startAmbChunk, AMB_INTERVAL_MS);

  typeWrite('阿福已開始靜靜聆聽，全天的對話都會幫您記錄下來。橘點亮著代表我在，完事後按「停止」即可。');
  speak('阿福已開始靜靜聆聽，有需要隨時叫我。');
}

function _startAmbChunk() {
  if (!_ambStream || !_ambSessionId) return;
  const chunks = [];
  const mr = new MediaRecorder(_ambStream, {mimeType:'audio/webm;codecs=opus'});
  mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  mr.onstop = async () => {
    const blob = new Blob(chunks, {type:'audio/webm'});
    if (blob.size < 800) return;
    const fd = new FormData();
    fd.append('file', blob, `chunk_${Date.now()}.webm`);
    const headers = {}; if (_token) headers['Authorization'] = 'Bearer ' + _token;
    try {
      await fetch(API + `/ambient/chunk/${_ambSessionId}`, {method:'POST', body: fd, headers});
      _ambChunkCount++;
      const counter = document.getElementById('ambient-counter');
      if (counter) counter.textContent = `${_ambChunkCount} 段`;
    } catch(e) {}
  };
  mr.start();
  setTimeout(() => { try { mr.stop(); } catch(e) {} }, AMB_INTERVAL_MS - 500);
  _ambMediaRecorder = mr;
}

async function stopAmbient() {
  if (!_ambSessionId) return;
  clearInterval(_ambInterval); _ambInterval = null;
  try { _ambMediaRecorder?.stop(); } catch(e) {}
  try { _ambStream?.getTracks().forEach(t => t.stop()); } catch(e) {}
  _ambStream = null;
  document.getElementById('ambient-bar').classList.remove('active');
  typeWrite('阿福正在整理今日的記錄，請稍候…');
  await new Promise(r => setTimeout(r, 2000));
  try {
    const r = await apiFetch(`/ambient/stop/${_ambSessionId}`, {method:'POST'});
    const d = await r.json();
    if (d.report) {
      showCard({title:`今日動態報告｜${new Date().toLocaleDateString('zh-TW')}`, content:d.report, type:'document'});
      typeWrite(`今日共記錄了 ${d.chunks} 段對話，報告已整理完成，主人請過目。`);
      speak('今日動態報告已整理完成，主人請過目。');
    }
  } catch(e) { typeWrite('報告整理失敗，請稍後再試。'); }
  _ambSessionId = null; _ambChunkCount = 0;
}

// ── Meeting recording ─────────────────────────────────────────────────────────
let _recorder = null, _recChunks = [], _recIndicator = null;

function startMeeting() {
  if (_recorder) return;
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream => {
    _recChunks = [];
    _recorder = new MediaRecorder(stream, {mimeType:'audio/webm'});
    _recorder.ondataavailable = e => { if (e.data.size > 0) _recChunks.push(e.data); };
    _recorder.start(1000);
    _recIndicator = document.createElement('div');
    _recIndicator.id = 'rec-dot';
    _recIndicator.style.cssText = 'position:fixed;top:16px;right:16px;width:10px;height:10px;border-radius:50%;background:#e05;animation:blink 1s infinite;z-index:100;';
    document.body.appendChild(_recIndicator);
    const s = document.createElement('style');
    s.textContent = '@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}';
    document.head.appendChild(s);
  }).catch(() => typeWrite('主人，麥克風無法存取，請確認瀏覽器權限。'));
}

async function stopMeeting() {
  if (!_recorder) return;
  return new Promise(resolve => {
    _recorder.onstop = async () => {
      const blob = new Blob(_recChunks, {type:'audio/webm'});
      _recChunks = [];
      if (_recIndicator) { _recIndicator.remove(); _recIndicator = null; }
      _recorder.stream.getTracks().forEach(t => t.stop()); _recorder = null;
      setState('thinking'); typeWrite('主人，會議錄音上傳中，請稍候…');
      const fd = new FormData(); fd.append('file', blob, 'meeting.webm');
      const headers = {}; if (_token) headers['Authorization'] = 'Bearer ' + _token;
      try {
        const t = await fetch(API + '/transcribe', {method:'POST', body: fd, headers});
        const td = await t.json();
        const transcript = td.transcript || '';
        if (!transcript) { typeWrite('主人，錄音太短或無法辨識。'); setState(''); return; }
        const n = await apiFetch('/meeting-notes', {method:'POST', body:JSON.stringify({transcript})});
        const nd = await n.json();
        setState(''); speak(nd.spoken || '會議記錄整理完成。'); typeWrite('主人，會議記錄整理完成。');
        if (nd.summary) setTimeout(() => showCard({title:nd.title||'會議記錄', content:nd.summary, type:'document'}), 600);
      } catch(e) { setState(''); typeWrite('主人，會議記錄整理失敗。'); }
      resolve();
    };
    _recorder.stop();
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  loadHistory();
  await ensureAuth();

  try {
    const r = await apiFetch('/greet');
    const d = await r.json();
    if (d.text) {
      setTimeout(() => {
        typeWrite(d.text);
        document.getElementById('hint').textContent = '輕觸、阿福開口';
        document.getElementById('afu-reply')._greet = d.text;
        setTimeout(requestGPSPermission, 1500);
      }, 600);
    }
  } catch(e) {
    console.error('[Alfred] greet failed:', e);
  }
})();
</script>
